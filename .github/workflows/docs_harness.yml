# SPDX-License-Identifier: MPL-2.0

name: "(CI) Docs LLM Harness"

on:
  workflow_dispatch:
  schedule:
    # Weekly Monday 00:00 JST. GitHub schedules run on the default branch.
    - cron: "0 15 * * 0"
  pull_request:
    paths:
      - "deno.json"
      - "tools/docs-harness/**"
      - "tools/feles-build.ts"
      - "tools/dev-tool.ts"
      - "tools/src/colocated_test_runner.ts"
      - "tools/src/browser_test_collector.ts"
      - "browser-features/chrome/README.md"
      - "browser-features/chrome/common/**"
      - "browser-features/chrome/static/**"
      - "browser-features/modules/modules/BrowserGlue.sys.mts"
      - "browser-features/modules/modules/os-server/**"
      - "browser-features/modules/modules/os-automotor/**"
      - "browser-features/pages-settings/src/App.tsx"
      - "browser-features/pages-settings/src/app/floorp-os/**"
      - "browser-features/pages-settings/src/main.tsx"
      - "browser-features/pages-settings/vite.config.ts"
      - "bridge/startup/src/chrome_root.ts"
      - "bridge/loader-features/vite.config.ts"
      - "bridge/loader-features/loader/index.ts"
      - "bridge/loader-features/loader/modules.ts"
      - "bridge/loader-features/loader/modules-hooks.ts"
      - "static/gecko/pref/override.ini"
      - "tools/os-test/**"
      - "docs/development/**"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "deno.json"
      - "tools/docs-harness/**"
      - "tools/feles-build.ts"
      - "tools/dev-tool.ts"
      - "tools/src/colocated_test_runner.ts"
      - "tools/src/browser_test_collector.ts"
      - "browser-features/chrome/README.md"
      - "browser-features/chrome/common/**"
      - "browser-features/chrome/static/**"
      - "browser-features/modules/modules/BrowserGlue.sys.mts"
      - "browser-features/modules/modules/os-server/**"
      - "browser-features/modules/modules/os-automotor/**"
      - "browser-features/pages-settings/src/App.tsx"
      - "browser-features/pages-settings/src/app/floorp-os/**"
      - "browser-features/pages-settings/src/main.tsx"
      - "browser-features/pages-settings/vite.config.ts"
      - "bridge/startup/src/chrome_root.ts"
      - "bridge/loader-features/vite.config.ts"
      - "bridge/loader-features/loader/index.ts"
      - "bridge/loader-features/loader/modules.ts"
      - "bridge/loader-features/loader/modules-hooks.ts"
      - "static/gecko/pref/override.ini"
      - "tools/os-test/**"
      - "docs/development/**"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  verify:
    if: github.event_name != 'workflow_dispatch' && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with:
          deno-version: v2.x
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/deno
          key: deno-docs-harness-${{ hashFiles('deno.lock') }}
          restore-keys: deno-docs-harness-
      - run: deno install
      - name: Collect docs inventory
        run: deno task docs-harness:collect --out _dist/docs-harness/inventory.json
      - name: Verify docs inventory
        shell: bash
        run: |
          set -euo pipefail
          if [ -d docs/development ]; then
            deno task docs-harness:verify \
              --inventory _dist/docs-harness/inventory.json \
              --docs-dir docs
          else
            deno task docs-harness:verify \
              --inventory _dist/docs-harness/inventory.json
          fi
      - name: Run docs harness unit tests
        run: deno task test:docs-harness

  generate-docs-artifact:
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout Floorp
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with:
          deno-version: v2.x

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/deno
          key: deno-docs-harness-${{ hashFiles('deno.lock') }}
          restore-keys: deno-docs-harness-

      - run: deno install

      - name: Validate LLM config
        shell: bash
        env:
          CONFIGURED_DOCS_LLM_BASE_URL: ${{ vars.DOCS_LLM_BASE_URL }}
          CONFIGURED_DOCS_LLM_MODEL: ${{ vars.DOCS_LLM_MODEL }}
          CONFIGURED_DOCS_LLM_TEMPERATURE: ${{ vars.DOCS_LLM_TEMPERATURE }}
          CONFIGURED_DOCS_AUDIT_LLM_BASE_URL: ${{ vars.DOCS_AUDIT_LLM_BASE_URL }}
          CONFIGURED_DOCS_AUDIT_LLM_MODEL: ${{ vars.DOCS_AUDIT_LLM_MODEL }}
          CONFIGURED_DOCS_AUDIT_LLM_TEMPERATURE: ${{ vars.DOCS_AUDIT_LLM_TEMPERATURE }}
          DOCS_LLM_API_KEY: ${{ secrets.DOCS_LLM_API_KEY }}
          DOCS_AUDIT_LLM_API_KEY: ${{ secrets.DOCS_AUDIT_LLM_API_KEY }}
        run: |
          set -euo pipefail
          base_url="${CONFIGURED_DOCS_LLM_BASE_URL:-https://ollama.com/v1}"
          model="${CONFIGURED_DOCS_LLM_MODEL:-kimi-k2.7-code}"
          temperature="${CONFIGURED_DOCS_LLM_TEMPERATURE:-0}"
          audit_base_url="${CONFIGURED_DOCS_AUDIT_LLM_BASE_URL:-${base_url}}"
          audit_model="${CONFIGURED_DOCS_AUDIT_LLM_MODEL:-glm-5.2}"
          audit_temperature="${CONFIGURED_DOCS_AUDIT_LLM_TEMPERATURE:-0}"
          if [[ "${base_url}" == https://ollama.com* ]] && [ -z "${DOCS_LLM_API_KEY}" ]; then
            echo "DOCS_LLM_API_KEY is required when using Ollama Cloud."
            exit 1
          fi
          if [[ "${audit_base_url}" == https://ollama.com* ]] && [ -z "${DOCS_AUDIT_LLM_API_KEY}${DOCS_LLM_API_KEY}" ]; then
            echo "DOCS_LLM_API_KEY or DOCS_AUDIT_LLM_API_KEY is required when auditing with Ollama Cloud."
            exit 1
          fi
          {
            printf 'DOCS_LLM_BASE_URL=%s\n' "${base_url}"
            printf 'DOCS_LLM_MODEL=%s\n' "${model}"
            printf 'DOCS_LLM_TEMPERATURE=%s\n' "${temperature}"
            printf 'DOCS_AUDIT_LLM_BASE_URL=%s\n' "${audit_base_url}"
            printf 'DOCS_AUDIT_LLM_MODEL=%s\n' "${audit_model}"
            printf 'DOCS_AUDIT_LLM_TEMPERATURE=%s\n' "${audit_temperature}"
          } >> "${GITHUB_ENV}"

      - name: Collect docs inventory
        run: deno task docs-harness:collect --out _dist/docs-harness/inventory.json

      - name: Generate docs with OpenAI-compatible LLM
        env:
          DOCS_LLM_API_KEY: ${{ secrets.DOCS_LLM_API_KEY }}
          DOCS_LLM_RESPONSE_FORMAT: ${{ vars.DOCS_LLM_RESPONSE_FORMAT }}
        run: |
          deno task docs-harness:generate \
            --inventory _dist/docs-harness/inventory.json \
            --out docs

      - name: Ensure generation only changed generated docs
        shell: bash
        run: |
          set -euo pipefail
          unexpected="$(
            git status --porcelain --untracked-files=all |
              awk '$2 !~ /^docs\/development\// && $2 !~ /^_dist\// { print }'
          )"
          if [ -n "${unexpected}" ]; then
            echo "${unexpected}"
            exit 1
          fi

      - name: Verify generated MDX
        run: |
          deno task docs-harness:verify \
            --inventory _dist/docs-harness/inventory.json \
            --docs-dir docs

      - name: Audit generated docs with OpenAI-compatible LLM
        env:
          DOCS_LLM_API_KEY: ${{ secrets.DOCS_LLM_API_KEY }}
          DOCS_LLM_RESPONSE_FORMAT: ${{ vars.DOCS_LLM_RESPONSE_FORMAT }}
          DOCS_AUDIT_LLM_BASE_URL: ${{ vars.DOCS_AUDIT_LLM_BASE_URL }}
          DOCS_AUDIT_LLM_MODEL: ${{ vars.DOCS_AUDIT_LLM_MODEL }}
          DOCS_AUDIT_LLM_API_KEY: ${{ secrets.DOCS_AUDIT_LLM_API_KEY }}
          DOCS_AUDIT_LLM_TEMPERATURE: ${{ vars.DOCS_AUDIT_LLM_TEMPERATURE }}
          DOCS_AUDIT_LLM_RESPONSE_FORMAT: ${{ vars.DOCS_AUDIT_LLM_RESPONSE_FORMAT }}
        run: |
          deno task docs-harness:audit \
            --inventory _dist/docs-harness/inventory.json \
            --docs-dir docs \
            --out _dist/docs-harness/llm/audit.json

      - name: Upload generated docs artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: docs-harness-generated
          path: |
            _dist/docs-harness/inventory.json
            _dist/docs-harness/llm/audit.json
            docs/development
